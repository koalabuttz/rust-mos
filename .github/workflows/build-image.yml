# Build and publish rust-mos Docker image from source (Option B)
#
# Produces multi-arch images (amd64 + arm64) and pushes to ghcr.io.
# All compilation happens from source — fully reproducible.
# Each architecture builds natively on its own runner (no QEMU emulation).
#
# Triggers:
#   - Push to main branch (automatic)
#   - Manual dispatch with configurable SHAs

name: Build Docker Image

on:
  push:
    branches: [main]
    paths:
      - 'docker/**'
      - '.github/workflows/build-image.yml'
  workflow_dispatch:
    inputs:
      llvm_mos_sha:
        description: 'llvm-mos commit SHA'
        required: false
        type: string
      llvm_mos_sdk_sha:
        description: 'llvm-mos-sdk commit SHA'
        required: false
        type: string
      rust_mos_sha:
        description: 'rust-mos commit SHA (defaults to triggering commit)'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Default SHAs — update these when upgrading upstream dependencies
  DEFAULT_LLVM_MOS_SHA: '54c694f07199151b3394ea2af9f4790d51166852'
  DEFAULT_LLVM_MOS_SDK_SHA: '45371581201110552a51b3b1de2aae1a0b0af89c'

# Only run one build at a time per branch
concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build each architecture natively on its own runner
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest      # x86_64, 4 vCPU (public repo)
          - arch: arm64
            runner: ubuntu-24.04-arm   # aarch64, 4 vCPU (public repo)
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 360  # 6h — LLVM builds are slow
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve SHAs
        id: sha
        run: |
          LLVM_SHA="${{ inputs.llvm_mos_sha || env.DEFAULT_LLVM_MOS_SHA }}"
          SDK_SHA="${{ inputs.llvm_mos_sdk_sha || env.DEFAULT_LLVM_MOS_SDK_SHA }}"
          RUST_SHA="${{ inputs.rust_mos_sha || github.sha }}"

          echo "llvm=${LLVM_SHA}" >> "$GITHUB_OUTPUT"
          echo "sdk=${SDK_SHA}" >> "$GITHUB_OUTPUT"
          echo "rust=${RUST_SHA}" >> "$GITHUB_OUTPUT"

          # Short SHAs for tagging (matches mrk-its naming: llvm-sdk-rust)
          echo "llvm_short=$(echo ${LLVM_SHA} | cut -c1-9)" >> "$GITHUB_OUTPUT"
          echo "sdk_short=$(echo ${SDK_SHA} | cut -c1-7)" >> "$GITHUB_OUTPUT"
          echo "rust_short=$(echo ${RUST_SHA} | cut -c1-9)" >> "$GITHUB_OUTPUT"

      - name: Free up disk space
        run: |
          echo "=== Freeing disk space for LLVM build ==="
          df -h
          sudo apt-get update
          sudo apt-get remove -y '^dotnet-.*' '^llvm-.*' 'aspnetcore.*' 'temurin.*' \
               azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable \
               firefox powershell mono-devel '^gfortran.*' 'libllvm.*' \
               'mysql-server-core-.*' 'libclang-common.*' '^gcc-1[0-3].*' \
               '^postgresql.*' 'libclang-cpp.*' '^.*-dev$' 2>/dev/null || true
          sudo apt-get autoremove -y
          sudo apt-get clean
          sudo rm -rf /usr/share/dotnet /usr/share/swift /usr/share/miniconda \
                      /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (per-arch)
        uses: docker/build-push-action@v6
        with:
          file: docker/Dockerfile.build
          context: docker
          platforms: linux/${{ matrix.arch }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.llvm_short }}-${{ steps.sha.outputs.sdk_short }}-${{ steps.sha.outputs.rust_short }}-${{ matrix.arch }}
          build-args: |
            LLVM_MOS_SHA=${{ steps.sha.outputs.llvm }}
            LLVM_MOS_SDK_SHA=${{ steps.sha.outputs.sdk }}
            RUST_MOS_SHA=${{ steps.sha.outputs.rust }}
          labels: |
            org.opencontainers.image.revision=${{ steps.sha.outputs.rust }}
            org.opencontainers.image.description=LLVM-MOS ${{ steps.sha.outputs.llvm_short }} + SDK ${{ steps.sha.outputs.sdk_short }} + rust-mos ${{ steps.sha.outputs.rust_short }} (${{ matrix.arch }})
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,scope=${{ matrix.arch }},mode=max

  # Create multi-arch manifest from per-arch images
  manifest:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      packages: write

    steps:
      - name: Resolve tag
        id: sha
        run: |
          LLVM_SHA="${{ inputs.llvm_mos_sha || env.DEFAULT_LLVM_MOS_SHA }}"
          SDK_SHA="${{ inputs.llvm_mos_sdk_sha || env.DEFAULT_LLVM_MOS_SDK_SHA }}"
          RUST_SHA="${{ inputs.rust_mos_sha || github.sha }}"
          TAG="$(echo ${LLVM_SHA} | cut -c1-9)-$(echo ${SDK_SHA} | cut -c1-7)-$(echo ${RUST_SHA} | cut -c1-9)"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          TAG="${{ steps.sha.outputs.tag }}"
          IMAGE="${REGISTRY}/${IMAGE_NAME}"

          docker buildx imagetools create \
            -t "${IMAGE}:${TAG}" \
            -t "${IMAGE}:latest" \
            "${IMAGE}:${TAG}-amd64" \
            "${IMAGE}:${TAG}-arm64"

          echo "=== Multi-arch manifest created ==="
          docker buildx imagetools inspect "${IMAGE}:${TAG}"

  # Smoke test the published image
  test:
    needs: manifest
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    permissions:
      packages: read

    steps:
      - name: Resolve tag
        id: sha
        run: |
          LLVM_SHA="${{ inputs.llvm_mos_sha || env.DEFAULT_LLVM_MOS_SHA }}"
          SDK_SHA="${{ inputs.llvm_mos_sdk_sha || env.DEFAULT_LLVM_MOS_SDK_SHA }}"
          RUST_SHA="${{ inputs.rust_mos_sha || github.sha }}"
          TAG="$(echo ${LLVM_SHA} | cut -c1-9)-$(echo ${SDK_SHA} | cut -c1-7)-$(echo ${RUST_SHA} | cut -c1-9)"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Smoke test — toolchain versions
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAME}:${{ steps.sha.outputs.tag }}"
          echo "=== Testing ${IMAGE} on ${{ matrix.arch }} ==="

          echo "--- rustc version ---"
          docker run --rm "$IMAGE" rustc --version

          echo "--- cargo version ---"
          docker run --rm "$IMAGE" cargo --version

          echo "--- clang version ---"
          docker run --rm "$IMAGE" mos-clang --version

          echo "--- MOS targets ---"
          docker run --rm "$IMAGE" ls /usr/local/rust-mos/targets/

          echo "--- User check (should be 'mos') ---"
          docker run --rm "$IMAGE" whoami

      - name: Smoke test — compile MOS hello world
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAME}:${{ steps.sha.outputs.tag }}"

          mkdir -p /tmp/test-mos/src
          chown -R 1000:1000 /tmp/test-mos
          cat > /tmp/test-mos/Cargo.toml << 'EOF'
          [package]
          name = "test-mos"
          version = "0.1.0"
          edition = "2021"
          EOF

          cat > /tmp/test-mos/src/main.rs << 'EOF'
          #![no_std]
          #![no_main]
          #[panic_handler]
          fn panic(_info: &core::panic::PanicInfo) -> ! { loop {} }
          #[no_mangle]
          pub extern "C" fn main() -> i32 { 42 }
          EOF

          docker run --rm \
            -v /tmp/test-mos:/work \
            -w /work \
            "$IMAGE" \
            cargo build --target mos-c64-none -Zbuild-std=core --release

          echo "=== MOS compilation succeeded on ${{ matrix.arch }} ==="
